name: CI

on:
  push:
  pull_request:

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Dependency smoke (production entry imports)
        run: |
          python -c "import neotrade3.scheduler.task_scheduler"
          python -c "import apps.api.main"

      - name: Run stable backend subset
        run: python -m pytest tests -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neotrade3-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: neotrade3-dashboard/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm run test

      - name: Build frontend
        run: npm run build
